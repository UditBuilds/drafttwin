{% extends "base.html" %}
{% block title %}Login — DraftTwin{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Log in</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('auth.login') }}" class="form">
    <label>Email
      <input type="email" name="email" value="{{ email or '' }}" required autofocus />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button type="submit" class="primary">Log in</button>
  </form>
  <p class="hint">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>.</p>
</div>
{% endblock %}
