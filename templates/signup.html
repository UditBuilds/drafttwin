{% extends "base.html" %}
{% block title %}Sign up — DraftTwin{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Create your account</h1>
  <p class="lede">One account per brand. You'll set up your brain file right after.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('auth.signup') }}" class="form">
    <label>Email
      <input type="email" name="email" value="{{ email or '' }}" required autofocus />
    </label>
    <label>Password <span class="hint">(min 8 characters)</span>
      <input type="password" name="password" minlength="8" required />
    </label>
    <button type="submit" class="primary">Create account</button>
  </form>
  <p class="hint">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
</div>
{% endblock %}
