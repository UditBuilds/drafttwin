<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — DraftTwin</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #1a1a2e;
      --bg-input: #0f0f18;
      --border: #1f1f2e;
      --border-strong: #2a2a3d;
      --text: #f5f5f7;
      --muted: #8b8b94;
      --accent: #4F46E5;
      --accent-hover: #6366f1;
      --red: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(79, 70, 229, 0.15), transparent 70%),
        var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 24px; align-items: center; font-size: 14px; }
    .nav-links a { color: var(--muted); }
    .nav-links a:hover { color: var(--text); }

    .auth-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 20px;
      min-height: calc(100vh - 70px);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .auth-card h1 {
      font-size: 26px;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      font-weight: 700;
    }
    .auth-card .sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 28px;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    form label {
      display: block;
      margin-bottom: 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    form label .hint { color: var(--muted); font-weight: 400; margin-left: 6px; }
    form input {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--bg-input);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    form input::placeholder { color: #4a4a55; }
    form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    button.primary {
      width: 100%;
      padding: 13px 20px;
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .foot {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin: 24px 0 0;
    }

    @media (max-width: 480px) {
      .nav { padding: 14px 20px; }
      .auth-card { padding: 32px 24px; }
      .auth-card h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-brand" href="/">Draft<span>Twin</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="{{ url_for('auth.login') }}">Log in</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="sub">One account per brand. Your brain file lives here.</p>

      {% if error %}<div class="error">{{ error }}</div>{% endif %}

      <form method="post" action="{{ url_for('auth.signup') }}">
        <label>Email
          <input type="email" name="email" value="{{ email or '' }}" placeholder="you@brand.com" required autofocus />
        </label>
        <label>Password <span class="hint">(min 8 characters)</span>
          <input type="password" name="password" placeholder="••••••••" minlength="8" required />
        </label>
        <button type="submit" class="primary">Create account →</button>
      </form>

      <p class="foot">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
    </div>
  </div>

</body>
</html>
